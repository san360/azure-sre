server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Azure DNS resolver — resolves Container Apps FQDNs and AKS external URLs.
    # Backend URLs are injected as full FQDNs via environment variables.
    resolver 168.63.129.16 valid=30s ipv6=off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/menu/ {
        set $menu_backend "${MENU_API_URL}";
        rewrite ^/api/menu/(.*) /$1 break;
        proxy_pass $menu_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    location /api/orders/ {
        set $orders_backend "${ORDER_API_URL}";
        rewrite ^/api/orders/(.*) /$1 break;
        proxy_pass $orders_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    location /api/payments/ {
        set $payments_backend "${PAYMENT_API_URL}";
        rewrite ^/api/payments/(.*) /$1 break;
        proxy_pass $payments_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }
}
