apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-api
  namespace: production
  labels:
    app: order-api
    app.kubernetes.io/part-of: contoso-meals
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-api
  template:
    metadata:
      labels:
        app: order-api
        app.kubernetes.io/part-of: contoso-meals
    spec:
      nodeSelector:
        workload-type: application
      containers:
        - name: order-api
          image: ${ACR_NAME}.azurecr.io/contoso-meals/order-api:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: ConnectionStrings__OrdersDb
              valueFrom:
                secretKeyRef:
                  name: contoso-meals-secrets
                  key: orders-db-connection-string
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: contoso-meals-secrets
                  key: appinsights-connection-string
            - name: PaymentService__BaseUrl
              value: "http://payment-service.production.svc.cluster.local"
            - name: MenuApi__BaseUrl
              value: "http://menu-api.production.svc.cluster.local"
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: order-api
  namespace: production
  labels:
    app: order-api
    app.kubernetes.io/part-of: contoso-meals
spec:
  type: LoadBalancer
  selector:
    app: order-api
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
