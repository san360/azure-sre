apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: production
  labels:
    app: payment-service
    app.kubernetes.io/part-of: contoso-meals
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        app.kubernetes.io/part-of: contoso-meals
    spec:
      containers:
        - name: payment-service
          image: ${ACR_NAME}.azurecr.io/contoso-meals/payment-service:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: ConnectionStrings__OrdersDb
              valueFrom:
                secretKeyRef:
                  name: contoso-meals-secrets
                  key: orders-db-connection-string
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: contoso-meals-secrets
                  key: appinsights-connection-string
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: production
  labels:
    app: payment-service
    app.kubernetes.io/part-of: contoso-meals
spec:
  type: LoadBalancer
  selector:
    app: payment-service
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
---
# NOTE: No PodDisruptionBudget for payment-service intentionally.
# This is by design for the demo - Chaos Studio can kill all pods
# simultaneously, causing the incident that the SRE Agent investigates.
# Part 3 Scene 3.4 recommends adding a PDB as a remediation action.
